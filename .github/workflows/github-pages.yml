name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pillow-${{ runner.os }}

      - name: Cache Noto CJK fonts
        uses: actions/cache@v4
        id: cache-noto-fonts
        with:
          path: /usr/share/fonts/opentype/noto
          key: fonts-noto-cjk-${{ runner.os }}-v1

      - name: Cache OGP images
        uses: actions/cache@v4
        with:
          path: assets/ogp/daily
          key: ogp-v2-${{ hashFiles('blog/daily/**/*.md', 'scripts/generate_ogp.py') }}

      - name: Install OGP generator dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow
          if [ "${{ steps.cache-noto-fonts.outputs.cache-hit }}" != "true" ]; then
            sudo apt-get update
            sudo apt-get install -y fonts-noto-cjk
          fi

      - name: Generate per-article OGP images
        run: python3 scripts/generate_ogp.py

      - name: Build with Jekyll
        run: bundle exec jekyll build

      - name: Copy .well-known directory
        run: |
          mkdir -p _site/.well-known/
          cp -r .well-known/* _site/.well-known/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
